# Alembic Configuration File

# Path to migration scripts
script_location = alembic

# Message template
file_template = %%(rev)s_%%(slug)s

# Timestamp format
date_format = %%Y-%%m-%%d %%H:%%M:%%S

# SQLAlchemy database URL
sqlalchemy.url = postgresql+asyncpg://floodguard:floodguard@localhost:5432/floodguard_ke

# Python logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
